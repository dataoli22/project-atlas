ext {
    // 29 (not Capacitor's default 22, not the 26 androidx.health.connect:connect-client alone
    // required) - the Samsung Health Data SDK's own AAR manifest declares
    // <uses-sdk android:minSdkVersion="29"/>, which fails the manifest merge if this project's
    // minSdkVersion is lower. Bumping the whole app rather than overriding the merge check
    // (tools:overrideLibrary) deliberately - an override would build but silently be wrong on
    // real Android 9 (API 28) and below devices, which the SDK likely never actually supports.
    // API 29 = Android 10 (2019); the real-world reach lost is small for a companion health app.
    minSdkVersion = 29
    compileSdkVersion = 34
    targetSdkVersion = 34
    androidxActivityVersion = '1.8.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.12.0'
    androidxFragmentVersion = '1.6.2'
    coreSplashScreenVersion = '1.0.1'
    androidxWebkitVersion = '1.9.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'
}