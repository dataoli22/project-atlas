apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "com.projectatlas.mobile"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.projectatlas.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Release signing reads from env vars (CI: GitHub Actions secrets ANDROID_KEYSTORE_BASE64/
    // ANDROID_KEYSTORE_PASSWORD/ANDROID_KEY_ALIAS/ANDROID_KEY_PASSWORD, decoded to
    // app/atlas-release.jks by the release workflow before this runs) rather than being hardcoded,
    // so the keystore password is never committed. Local debug builds don't need this - only
    // `assembleRelease`/`bundleRelease` reference this signingConfig. Falls back to no signing
    // config (an unsigned build) when the env vars aren't set, so `assembleDebug` and plain local
    // `assembleRelease` runs (e.g. this session's earlier verification builds) keep working
    // without requiring every contributor to have the release keystore.
    def releaseKeystorePath = System.getenv("ANDROID_KEYSTORE_PATH") ?: "atlas-release.jks"
    def hasReleaseSigningEnv = System.getenv("ANDROID_KEYSTORE_BASE64") != null

    if (hasReleaseSigningEnv) {
        signingConfigs {
            release {
                storeFile file(releaseKeystorePath)
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigningEnv) {
                signingConfig signingConfigs.release
            }
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Health Connect - reads Exercise/Hydration/Weight/Steps/TotalCaloriesBurned for
    // HealthConnectPlugin.kt. Pinned to alpha07, not a newer alpha, because later alphas
    // (alpha11+) require compileSdk 35, which needs a broader AGP/Gradle wrapper upgrade this
    // project hasn't made yet. Bump this and compileSdk/AGP together deliberately, not as a
    // side effect of an unrelated dependency bump.
    implementation "androidx.health.connect:connect-client:1.1.0-alpha07"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

    // Samsung Health Data SDK - proprietary, partner-program-gated, not on Maven Central.
    // libs/samsung-health-data-api-1.1.0.aar is gitignored (*.aar in mobile/android/.gitignore)
    // deliberately - it's Samsung's binary, not ours to redistribute in a public repo. Anyone
    // else building this project needs their own Samsung Health Partner Program approval and
    // must download the SDK from Samsung's developer portal themselves, placing the .aar at
    // this exact path. See SamsungHealthPlugin.kt.
    implementation files('libs/samsung-health-data-api-1.1.0.aar')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
